name = "cortexia-api"
main = "src/workers/api.ts"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "production"

# Database - Neon PostgreSQL (connected via env variables)
# DATABASE_URL is set in the Worker environment

# R2 Storage binding
[[r2_buckets]]
binding = "CORTEXIA_R2"
bucket_name = "cortexia"